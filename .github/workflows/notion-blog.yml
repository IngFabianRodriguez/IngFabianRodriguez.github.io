name: Sync Notion Blog

on:
  schedule:
    - cron: '0 8 * * *'   # Diario a las 8am UTC (3am Colombia)
  workflow_dispatch:        # Disparo manual desde GitHub Actions

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: cd scripts && npm ci

      - name: Generate blog pages from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: cd scripts && node generate-blog.js

      - name: Commit and push generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          git diff --staged --quiet \
            && echo "✅ No changes to commit" \
            || (git commit -m "chore(blog): sync articles from Notion [skip ci]" && git push)
